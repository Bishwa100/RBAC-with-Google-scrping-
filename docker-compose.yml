version: '3.9'

services:
  # ============================================================================
  # Database Services
  # ============================================================================
  
  postgres:
    image: postgres:16
    container_name: rbac-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rbac_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rbac_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: app-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ============================================================================
  # Unified Backend (RBAC + TopicLens)
  # ============================================================================

  backend:
    build: ./RBAC-main/backend
    container_name: app-backend
    volumes:
      - ./RBAC-main/backend:/app
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/rbac_db
      
      # JWT & Security
      - SECRET_KEY=change_me_in_production_secure_random_key_here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      
      # Root User
      - ROOT_EMAIL=admin@topiclens.com
      - ROOT_PASSWORD=AdminPass123!
      
      # Doc Extractor
      - DOC_EXTRACTOR_URL=http://doc-extractor:8001
      
      # TopicLens Configuration
      - TOPICLENS_REDIS_URL=redis://redis:6379/0
      - TOPICLENS_HF_MODEL_ID=microsoft/phi-2
      - TOPICLENS_HF_DEVICE=cpu
      - TOPICLENS_HF_MAX_NEW_TOKENS=512
      - TOPICLENS_CELERY_BROKER_URL=redis://redis:6379/0
      - TOPICLENS_CELERY_RESULT_BACKEND=redis://redis:6379/0
      
      # Display (for browser automation)
      - DISPLAY=:99
      - NVIDIA_VISIBLE_DEVICES=all
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      doc-extractor:
        condition: service_started
    command: bash -c "alembic upgrade head && python create_topiclens_permissions.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-network

  # ============================================================================
  # Celery Worker for TopicLens Background Jobs
  # ============================================================================

  worker:
    build: ./RBAC-main/backend
    container_name: app-worker
    command: bash -c "Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp & sleep 2 && celery -A app.topiclens.celery_app worker --loglevel=info --concurrency=4"
    depends_on:
      - redis
      - postgres
    environment:
      # Same environment as backend
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/rbac_db
      - TOPICLENS_REDIS_URL=redis://redis:6379/0
      - TOPICLENS_HF_MODEL_ID=microsoft/phi-2
      - TOPICLENS_HF_DEVICE=cpu
      - TOPICLENS_HF_MAX_NEW_TOKENS=512
      - TOPICLENS_CELERY_BROKER_URL=redis://redis:6379/0
      - TOPICLENS_CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DISPLAY=:99
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./RBAC-main/backend:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-network

  # ============================================================================
  # Document Extractor Service
  # ============================================================================

  doc-extractor:
    build: ./RBAC-main/doc_extractor
    container_name: app-doc-extractor
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-network

  # ============================================================================
  # Frontend
  # ============================================================================

  frontend:
    build: ./frontend
    container_name: app-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - app-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  pgadmin_data:

# ============================================================================
# Networks
# ============================================================================
networks:
  app-network:
    driver: bridge

